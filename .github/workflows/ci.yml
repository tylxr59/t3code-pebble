name: Release PBW

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to rebuild and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      PEBBLE_TOOL_VERSION: "5.0.39"
      PEBBLE_SDK_VERSION: "4.17"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Pebble SDK
        run: |
          uv tool install "pebble-tool==$PEBBLE_TOOL_VERSION"
          pebble sdk install "$PEBBLE_SDK_VERSION"
          pebble --version

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: |
          case "$RELEASE_TAG" in v*) ;; *) exit 1 ;; esac
          git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"

      - name: Lint
        run: npm run lint

      - name: Build PBW
        run: |
          npm run build --if-present
          if ! compgen -G "build/*.pbw" >/dev/null; then pebble build; fi

      - name: Prepare release notes
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm run --silent release:notes -- "$VERSION" > release-notes.md

      - name: Upload PBW artifact
        uses: actions/upload-artifact@v6
        with:
          name: t3code-pebble-pbw
          path: build/*.pbw
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${RELEASE_TAG#v}"
          npm run --silent release:notes -- "$VERSION" > release-notes.md

          retry() {
            local attempt=1
            local delay=5
            while ! "$@"; do
              if (( attempt >= 6 )); then
                echo "Command failed after $attempt attempts: $*" >&2
                return 1
              fi
              echo "GitHub API request failed; retrying in ${delay}s (attempt $((attempt + 1))/6)" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
              delay=$((delay * 2))
              if (( delay > 30 )); then delay=30; fi
            done
          }

          ensure_release() {
            local output
            if output="$(gh release view "$RELEASE_TAG" 2>&1)"; then
              return 0
            fi
            if [[ "$output" == *"release not found"* ]]; then
              gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes-file release-notes.md
              return
            fi
            echo "$output" >&2
            return 1
          }

          retry ensure_release
          retry gh release edit "$RELEASE_TAG" --notes-file release-notes.md
          retry gh release upload "$RELEASE_TAG" build/*.pbw --clobber
