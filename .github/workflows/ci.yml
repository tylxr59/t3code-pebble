name: Release PBW

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to rebuild and publish
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
      PEBBLE_TOOL_VERSION: "5.0.39"
      PEBBLE_SDK_VERSION: "4.17"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Pebble SDK
        run: |
          uv tool install "pebble-tool==$PEBBLE_TOOL_VERSION"
          pebble sdk install "$PEBBLE_SDK_VERSION"
          pebble --version

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: |
          case "$RELEASE_TAG" in v*) ;; *) exit 1 ;; esac
          git ls-remote --exit-code --tags origin "refs/tags/$RELEASE_TAG"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$RELEASE_TAG" = "v$PACKAGE_VERSION"

      - name: Lint
        run: npm run lint

      - name: Build PBW
        run: |
          npm run build --if-present
          if ! compgen -G "build/*.pbw" >/dev/null; then pebble build; fi

      - name: Upload PBW artifact
        uses: actions/upload-artifact@v6
        with:
          name: t3code-pebble-pbw
          path: build/*.pbw
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$RELEASE_TAG" >/dev/null 2>&1 || \
            gh release create "$RELEASE_TAG" --title "$RELEASE_TAG" --notes "Automated Pebble build."
          gh release upload "$RELEASE_TAG" build/*.pbw --clobber
