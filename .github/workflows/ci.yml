name: Release PBW

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install system tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Pebble SDK
        run: |
          uv tool install pebble-tool
          pebble sdk install latest
          pebble --version

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          test "$GITHUB_REF_NAME" = "v$PACKAGE_VERSION"

      - name: Lint
        run: npm run lint

      - name: Build PBW
        run: npm run build

      - name: Upload PBW artifact
        uses: actions/upload-artifact@v4
        with:
          name: t3code-pebble-pbw
          path: build/*.pbw
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --notes "Automated Pebble build."
          gh release upload "$GITHUB_REF_NAME" build/*.pbw --clobber
